services:

  # ── Next.js Web-App ────────────────────────────────────────────────────────────
  web:
    image: ${BELEGSCANNER_IMAGE:-ghcr.io/nicolasasauer/belegscanner_web:latest}
    container_name: belegscanner-web
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # JWT-Signing-Secret für Auth — bitte mit eigenem Wert überschreiben:
      # echo "AUTH_SECRET=$(openssl rand -base64 32)" >> .env
      AUTH_SECRET: ${AUTH_SECRET:-bitte-aendern-fuer-sicherheit-mindestens-32-zeichen}
    volumes:
      # Datenbank + Uploads + Config persistent speichern
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/setup"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - belegscanner

  # ── Ollama (lokale KI) ─────────────────────────────────────────────────────────
  # Starten mit: docker compose --profile ai up -d
  # Modell laden: docker exec belegscanner-ollama ollama pull llava
  ollama:
    image: ollama/ollama:latest
    container_name: belegscanner-ollama
    restart: unless-stopped
    profiles:
      - ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - belegscanner

volumes:
  ollama_data:
    name: belegscanner-ollama-models

networks:
  belegscanner:
    driver: bridge
