name: Build & Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:  # manuell auslösbar

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/belegscanner-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # zum Pushen auf GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU für Cross-Compilation (amd64 → arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx für Multi-Platform-Builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: latest + git-sha (für Rollback)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64   # amd64 = PC/Server, arm64 = Raspberry Pi 4/5
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer-Cache für schnellere Folge-Builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
