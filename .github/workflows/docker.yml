name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:        # manuell auslösen möglich

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # → ghcr.io/nicolasasauer/belegscanner-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # für GHCR-Push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: QEMU einrichten (für ARM64-Cross-Compile)
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image-Tags & Labels berechnen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # :latest bei push auf main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # :v1.2.3 bei Git-Tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # :sha-abc1234 immer
            type=sha,prefix=sha-

      - name: Build & Push (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64    # ← Raspberry Pi 4/5 + normaler Server
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha                  # GitHub Actions Cache
          cache-to: type=gha,mode=max
